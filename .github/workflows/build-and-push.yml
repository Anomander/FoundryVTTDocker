name: Build and Push Foundry VTT Image

# Triggered when you publish a GitHub Release tagged v<version>
# e.g. tag: v13.351  →  image: ghcr.io/<owner>/foundryvtt:13.351
on:
  release:
    types: [published]

jobs:
  build-and-push:
    name: Build & push ghcr.io image
    runs-on: ubuntu-latest

    permissions:
      contents: read    # to download the release asset
      packages: write   # to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # No LFS needed — zip comes from the GitHub Release, not git

      - name: Derive image metadata
        id: meta
        run: |
          # Tag is v13.351 → strip leading 'v' → 13.351
          VERSION="${GITHUB_REF_NAME#v}"
          # ghcr.io requires all-lowercase owner name
          OWNER="${{ github.repository_owner }}"
          OWNER_LOWER="${OWNER,,}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "owner=${OWNER_LOWER}" >> "$GITHUB_OUTPUT"
          echo "Building Foundry VTT ${VERSION} as ghcr.io/${OWNER_LOWER}/foundryvtt:${VERSION}"

      - name: Download Foundry zip from this release
        run: |
          mkdir -p release
          gh release download "$GITHUB_REF_NAME" \
            --pattern "*.zip" \
            --output release/foundryvtt.zip
          echo "Downloaded: $(du -sh release/foundryvtt.zip | cut -f1)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify zip was downloaded
        run: |
          if [[ ! -s release/foundryvtt.zip ]]; then
            echo "ERROR: release/foundryvtt.zip is missing or empty."
            echo "Make sure you attached the Foundry Linux/Node.js zip to the release."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            FOUNDRY_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/foundryvtt:${{ steps.meta.outputs.version }}
            ghcr.io/${{ steps.meta.outputs.owner }}/foundryvtt:latest

      - name: Job summary
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          OWNER="${{ steps.meta.outputs.owner }}"
          echo "### ✅ Foundry VTT image published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** \`${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Set this in your Unraid container template:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "ghcr.io/${OWNER}/foundryvtt:${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Also pushed:_ \`ghcr.io/${OWNER}/foundryvtt:latest\`" >> "$GITHUB_STEP_SUMMARY"
